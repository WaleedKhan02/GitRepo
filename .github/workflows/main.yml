name: CI Pipeline

on:
  push:

jobs:
  docker-build:
    runs-on: ubuntu-latest

    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Build docker image
        run: docker build -t waleedkhan02/git-practice:v1

      - name: Login to Docker Hub 
        run: eche "${{secrets.DOCKER_PASSWORD}}" | docker login -u "${{secrets.DOCKER.USERNAME}}" --password-stdin

      - name: Push Image in Docker Hub
        run: docker push waleedkhan02/git-practice:v1
